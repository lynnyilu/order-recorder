<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运单录入系统</title>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    .container { max-width: 1500px; margin: 0 auto; padding: 18px 20px; }

    h1 {
      text-align: center;
      color: #1a73e8;
      margin-bottom: 18px;
      font-size: 22px;
      letter-spacing: 2px;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 8px;
      padding: 16px 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8f0fe;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Form elements */
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }

    .form-group { display: flex; flex-direction: column; gap: 4px; }

    .form-group label { font-size: 12px; color: #666; font-weight: 600; }

    input[type="text"] {
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }

    textarea {
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }

    /* Buttons */
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1a73e8; color: white; }
    .btn-primary:hover { background: #1558c0; }
    .btn-success { background: #34a853; color: white; font-size: 15px; padding: 10px 28px; }
    .btn-success:hover { background: #2a8a43; }
    .btn-danger { background: #ea4335; color: white; font-size: 11px; padding: 3px 9px; border-radius: 3px; }
    .btn-danger:hover { background: #c5221f; }
    .btn-link { background: none; color: #1a73e8; font-size: 12px; padding: 4px 8px; text-decoration: underline; cursor: pointer; border: none; }

    /* Address input area */
    .addr-input-wrap { display: flex; gap: 10px; align-items: stretch; }
    .addr-input-wrap textarea { flex: 1; min-height: 68px; }
    .addr-input-wrap .btn-primary { padding: 0 22px; font-size: 15px; min-height: 68px; }

    /* Orders Table */
    .table-wrapper { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }

    thead th {
      background: #1a73e8;
      color: white;
      padding: 9px 6px;
      text-align: center;
      white-space: nowrap;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tbody td {
      border: 1px solid #e8eaed;
      padding: 5px 5px;
      text-align: center;
      vertical-align: middle;
    }

    tbody tr:nth-child(even) td { background: #f8f9fa; }
    tbody tr:hover td { background: #e8f0fe !important; }

    .cell-input {
      border: none;
      background: transparent;
      text-align: center;
      font-size: 12.5px;
      font-family: inherit;
      outline: none;
      padding: 2px 3px;
      width: 100%;
    }
    .cell-input:focus {
      background: #fff;
      border: 1px solid #1a73e8;
      border-radius: 2px;
    }

    .cell-addr {
      text-align: left;
      min-width: 200px;
      max-width: 260px;
    }

    select.qty {
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 3px 2px;
      font-size: 12.5px;
      width: 46px;
      text-align: center;
      cursor: pointer;
      background: white;
    }
    select.qty:focus { border-color: #1a73e8; outline: none; }
    select.qty.nonzero { background: #e8f5e9; color: #2e7d32; font-weight: 700; border-color: #81c784; }

    .track-num { font-family: Consolas, monospace; font-size: 11.5px; white-space: nowrap; color: #0d47a1; }
    .row-idx { color: #aaa; font-size: 11px; }

    .empty-hint { text-align: center; padding: 36px; color: #bbb; font-size: 14px; }

    /* Item color header styles */
    .th-yellow  { background: #f9a825 !important; color: #333 !important; }
    .th-dyellow { background: #e65100 !important; color: #fff !important; }
    .th-blue    { background: #1e88e5 !important; color: #fff !important; }
    .th-purple  { background: #8e24aa !important; color: #fff !important; }
    .th-green   { background: #388e3c !important; color: #fff !important; }
    .th-other   { background: #546e7a !important; color: #fff !important; }

    /* Legend bar */
    .legend {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    /* Bottom action bar */
    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stats { font-size: 13px; color: #666; }
    .stats strong { color: #333; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #323232;
      color: white;
      padding: 11px 20px;
      border-radius: 5px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { background: #1b873b; }
    .toast.err { background: #c5221f; }

    /* Tip */
    .tip { font-size: 11.5px; color: #888; margin-top: 5px; }

    @media (max-width: 768px) {
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>运单录入系统</h1>

  <!-- Sender Info -->
  <div class="card">
    <div class="card-title">发件人信息（默认值，可修改）</div>
    <div class="form-row">
      <div class="form-group">
        <label>发货人姓名</label>
        <input type="text" id="senderName" value="JJ" style="width:120px">
      </div>
      <div class="form-group">
        <label>发货人电话</label>
        <input type="text" id="senderPhone" value="0452341018" style="width:150px">
      </div>
      <div class="form-group">
        <label>发货人详细地址</label>
        <input type="text" id="senderAddr" value="Denistone East" style="width:200px">
      </div>
    </div>
  </div>

  <!-- Input Panel -->
  <div class="card">
    <div class="card-title">添加订单</div>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group">
        <label>起始单号</label>
        <input type="text" id="startTrack" placeholder="例：JR25125853E" style="width:180px"
               oninput="onStartTrackChange()">
      </div>
      <div style="align-self:flex-end; font-size:12px; color:#888; padding-bottom:8px">
        每添加一条订单，单号自动 +1
      </div>
    </div>
    <div class="form-group">
      <label>收件人地址</label>
      <div class="addr-input-wrap">
        <textarea id="addrInput"
          placeholder="格式：省市区详细地址，收件人，座机（可省略），手机&#10;例：天津天津市大港区兴旺里68号楼二单元102室，石桂梅，022-63239736，13342099868"></textarea>
        <button class="btn btn-primary" onclick="addOrder()">＋ 添加</button>
      </div>
      <div class="tip">按 Ctrl + Enter 快速添加</div>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="card">
    <div class="card-title">
      <span>订单列表</span>
      <span id="statsText" class="stats">共 <strong>0</strong> 条订单</span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="min-width:30px">#</th>
            <th style="min-width:120px">单号</th>
            <th style="min-width:54px">收件人</th>
            <th style="min-width:62px">省</th>
            <th style="min-width:60px">市</th>
            <th style="min-width:54px">区</th>
            <th style="min-width:200px">详细地址</th>
            <th style="min-width:102px">手机</th>
            <th class="th-yellow"  style="min-width:50px">黄</th>
            <th class="th-blue"    style="min-width:50px">蓝</th>
            <th class="th-purple"  style="min-width:50px">紫</th>
            <th class="th-green"   style="min-width:50px">绿</th>
            <th class="th-dyellow" style="min-width:50px">大黄</th>
            <th class="th-other"   style="min-width:50px">其他</th>
            <th style="min-width:46px">操作</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="15" class="empty-hint">暂无订单，请在上方填写地址后点击「添加」</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Legend -->
    <div class="legend">
      <span style="color:#888; font-size:11px">品类对应：</span>
      <span class="leg-item" style="background:#fff8e1; color:#b36d00">
        <span class="leg-dot" style="background:#f9a825"></span>黄 = Selsun黄色洗发水200ml
      </span>
      <span class="leg-item" style="background:#e3f2fd; color:#0d47a1">
        <span class="leg-dot" style="background:#1e88e5"></span>蓝 = Selsun蓝色去屑控油洗发水200ml
      </span>
      <span class="leg-item" style="background:#f3e5f5; color:#4a148c">
        <span class="leg-dot" style="background:#8e24aa"></span>紫 = Selsun紫色洗发水200ml
      </span>
      <span class="leg-item" style="background:#e8f5e9; color:#1b5e20">
        <span class="leg-dot" style="background:#388e3c"></span>绿 = Selsun绿色洗发水200ml
      </span>
      <span class="leg-item" style="background:#fff3e0; color:#bf360c">
        <span class="leg-dot" style="background:#e65100"></span>大黄 = Selsun黄色洗发水375ml
      </span>
      <span class="leg-item" style="background:#eceff1; color:#263238">
        <span class="leg-dot" style="background:#546e7a"></span>其他 = 合生元婴幼儿有机奶粉3段800g
      </span>
    </div>

    <div class="action-bar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn btn-link" onclick="clearAll()">清空所有订单</button>
        <button id="undoBtn" class="btn" onclick="undoClear()"
          style="display:none; background:#f57c00; color:white; font-size:13px; padding:6px 14px">
          ↩ 恢复清空
        </button>
      </div>
      <button class="btn btn-success" onclick="generateExcel()">
        &#x2B07; 生成 Excel
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== 品类数据 =====================
const ITEMS = [
  { key: '黄',   name: 'Selsun黄色洗发水200ml',            barcode: '041167266038'  },
  { key: '蓝',   name: 'Selsun蓝色去屑控油洗发水200ml',     barcode: '41167660317'   },
  { key: '紫',   name: 'Selsun紫色洗发水200ml',             barcode: '041167662014'  },
  { key: '绿',   name: 'Selsun绿色洗发水200ml',             barcode: '9351791001006' },
  { key: '大黄', name: 'Selsun黄色洗发水375ml',             barcode: '041167266069'  },
  { key: '其他', name: 'Biostime合生元婴幼儿有机奶粉3段800g', barcode: '9311770608213' }
];

// ===================== 订单状态 =====================
let orders = [];
let nextOffset = 0;

// ===================== 单号工具 =====================
function parseStartTrack() {
  const v = document.getElementById('startTrack').value.trim();
  const m = v.match(/^([A-Za-z]+)(\d+)([A-Za-z]*)$/);
  if (!m) return null;
  return { prefix: m[1], num: parseInt(m[2], 10), len: m[2].length, suffix: m[3] };
}

function makeTrackNum(offset) {
  const p = parseStartTrack();
  if (!p) return '';
  const n = p.num + offset;
  return p.prefix + String(n).padStart(p.len, '0') + p.suffix;
}

function onStartTrackChange() {
  renderTable();
}

// ===================== 地址解析 =====================
function parseChineseAddress(addr) {
  let province = '', city = '', district = '';

  const pIdx   = addr.indexOf('省');
  const zzqIdx = addr.indexOf('自治区'); // 内蒙古/新疆/广西/宁夏/西藏

  let rest = '';

  if (zzqIdx >= 0 && (pIdx < 0 || zzqIdx < pIdx)) {
    // Autonomous region — province ends with "自治区"
    province = addr.substring(0, zzqIdx + 3);
    rest = addr.substring(zzqIdx + 3);
  } else if (pIdx >= 0) {
    // Regular province — ends with "省"
    province = addr.substring(0, pIdx + 1);
    rest = addr.substring(pIdx + 1);
  } else {
    // Direct municipality (北京/上海/天津/重庆)
    for (const m of ['上海', '北京', '天津', '重庆']) {
      if (addr.startsWith(m)) {
        province = m + '市';
        city = m + '市';
        // Skip repeated city name e.g. "天津市大港区..." → "大港区..."
        rest = addr.substring(m.length);
        const shIdx = rest.indexOf('市');
        if (shIdx >= 0 && shIdx <= 3) rest = rest.substring(shIdx + 1);
        district = findDistrict(rest);
        return { province, city, district };
      }
    }
    return { province, city, district };
  }

  // Find city-level division from remaining string
  // Handles: 市 / 地区（喀什地区）/ 自治州（伊犁哈萨克自治州）/ 盟（锡林郭勒盟）
  const cityResult = findCity(rest);
  if (cityResult) {
    city = cityResult.city;
    district = findDistrict(cityResult.rest);
  }

  return { province, city, district };
}

// Find the earliest city-level boundary and return city name + remainder
function findCity(str) {
  const suffixes = ['市', '地区', '自治州', '盟'];
  let best = null;
  for (const suf of suffixes) {
    const idx = str.indexOf(suf);
    if (idx >= 0) {
      const end = idx + suf.length;
      if (!best || end < best.end) {
        best = { city: str.substring(0, end), rest: str.substring(end), end };
      }
    }
  }
  return best;
}

function findDistrict(str) {
  // Find whichever of 区/县/市/旗 comes first (旗 = Inner Mongolia county)
  const candidates = ['区', '县', '市', '旗']
    .map(c => str.indexOf(c))
    .filter(i => i >= 0);
  if (candidates.length === 0) return '';
  const end = Math.min(...candidates);
  return str.substring(0, end + 1);
}

function parseFullAddress(input) {
  // Normalize separators
  const norm = input.replace(/，/g, ',').replace(/\s*,\s*/g, ',').trim();
  const parts = norm.split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length < 2) return null;

  const addrStr = parts[0];
  const rest = parts.slice(1);

  let name = '', mobile = '';

  for (const p of rest) {
    if (/^1[3-9]\d{9}$/.test(p)) {
      // Mobile number
      if (!mobile) mobile = p;
    } else if (/^\d{3,4}[-\s]\d{7,8}$/.test(p) || /^\d{7,8}$/.test(p)) {
      // Landline — skip
    } else if (!name && /^[\u4e00-\u9fa5]{2,6}$/.test(p)) {
      // Chinese name
      name = p;
    }
  }

  // Fallback: last 11-digit part as mobile
  if (!mobile) {
    for (let i = rest.length - 1; i >= 0; i--) {
      if (/^\d{11}$/.test(rest[i])) { mobile = rest[i]; break; }
    }
  }

  const { province, city, district } = parseChineseAddress(addrStr);

  return { addrStr, name, mobile, province, city, district };
}

// ===================== 添加订单 =====================
function addOrder() {
  const raw = document.getElementById('addrInput').value.trim();
  if (!raw) { showToast('请输入收件人地址', 'err'); return; }

  const parsed = parseFullAddress(raw);
  if (!parsed) { showToast('地址格式有误，请检查后重试', 'err'); return; }

  const order = {
    id: Date.now() + Math.random(),
    offset: nextOffset++,
    name:       parsed.name,
    mobile:     parsed.mobile,
    province:   parsed.province,
    city:       parsed.city,
    district:   parsed.district,
    addrStr:    parsed.addrStr,
    quantities: new Array(ITEMS.length).fill(0)
  };

  orders.push(order);
  // New order added — discard undo snapshot
  _clearedSnapshot = null;
  document.getElementById('undoBtn').style.display = 'none';
  renderTable();
  document.getElementById('addrInput').value = '';
  showToast('订单已添加 ✓', 'ok');
}

// ===================== 渲染表格 =====================
function renderTable() {
  const tbody = document.getElementById('ordersBody');
  document.getElementById('statsText').innerHTML =
    `共 <strong>${orders.length}</strong> 条订单`;

  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="15" class="empty-hint">暂无订单，请在上方填写地址后点击「添加」</td></tr>';
    return;
  }

  tbody.innerHTML = '';
  orders.forEach((o, idx) => {
    const tr = document.createElement('tr');
    tr.dataset.id = o.id;

    const tn = makeTrackNum(o.offset);

    // Qty selects
    const qtyHtml = ITEMS.map((_, i) => {
      const val = o.quantities[i];
      const cls = val > 0 ? 'qty nonzero' : 'qty';
      const opts = [0,1,2,3,4,5,6,7,8]
        .map(n => `<option value="${n}"${n===val?' selected':''}>${n}</option>`)
        .join('');
      return `<td><select class="${cls}" onchange="setQty(${o.id},${i},this)">${opts}</select></td>`;
    }).join('');

    tr.innerHTML = `
      <td class="row-idx">${idx + 1}</td>
      <td class="track-num">${tn || '<span style="color:#ccc">—</span>'}</td>
      <td><input class="cell-input" value="${esc(o.name)}"
            oninput="setField(${o.id},'name',this.value)" style="width:54px"></td>
      <td><input class="cell-input" value="${esc(o.province)}"
            oninput="setField(${o.id},'province',this.value)" style="width:62px"></td>
      <td><input class="cell-input" value="${esc(o.city)}"
            oninput="setField(${o.id},'city',this.value)" style="width:60px"></td>
      <td><input class="cell-input" value="${esc(o.district)}"
            oninput="setField(${o.id},'district',this.value)" style="width:54px"></td>
      <td class="cell-addr"><input class="cell-input" value="${esc(o.addrStr)}"
            oninput="setField(${o.id},'addrStr',this.value)"
            style="width:100%; text-align:left"></td>
      <td><input class="cell-input" value="${esc(o.mobile)}"
            oninput="setField(${o.id},'mobile',this.value)" style="width:102px"></td>
      ${qtyHtml}
      <td><button class="btn btn-danger" onclick="removeOrder(${o.id})">删除</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ===================== 数据更新 =====================
function setQty(id, itemIdx, sel) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const val = parseInt(sel.value, 10);
  o.quantities[itemIdx] = val;
  sel.className = val > 0 ? 'qty nonzero' : 'qty';
}

function setField(id, field, val) {
  const o = orders.find(x => x.id === id);
  if (o) o[field] = val;
}

function removeOrder(id) {
  const idx = orders.findIndex(o => o.id === id);
  if (idx < 0) return;
  orders.splice(idx, 1);
  // Reassign offsets so track numbers stay sequential
  orders.forEach((o, i) => { o.offset = i; });
  nextOffset = orders.length;
  renderTable();
}

let _clearedSnapshot = null;

function clearAll() {
  if (orders.length === 0) return;
  const count = orders.length;
  _clearedSnapshot = { orders: JSON.parse(JSON.stringify(orders)), nextOffset };
  orders = [];
  nextOffset = 0;
  renderTable();
  document.getElementById('undoBtn').style.display = '';
  showToast(`已清空 ${count} 条订单`, 'err');
}

function undoClear() {
  if (!_clearedSnapshot) return;
  orders = _clearedSnapshot.orders;
  nextOffset = _clearedSnapshot.nextOffset;
  _clearedSnapshot = null;
  renderTable();
  document.getElementById('undoBtn').style.display = 'none';
  showToast('已恢复', 'ok');
}

// ===================== 生成 Excel =====================
function generateExcel() {
  if (orders.length === 0) { showToast('请先添加订单', 'err'); return; }
  if (!parseStartTrack() && orders.some(o => !makeTrackNum(o.offset))) {
    if (!confirm('起始单号未填写，导出文件中单号将为空，确认继续？')) return;
  }

  const senderName  = document.getElementById('senderName').value.trim();
  const senderPhone = document.getElementById('senderPhone').value.trim();
  const senderAddr  = document.getElementById('senderAddr').value.trim();

  // Header row matches 运单导入模板一单多件.xlsx
  const HEADERS = [
    '*订单号', '*收货人', '*省', '*市', '*区',
    '*收货人详细地址', '收货人邮编', '*收货人手机号码', '收货人身份证号码',
    '*包裹毛重', '是否仓配', '*物品名称', '*物品条形码', '*物品数量',
    '备注信息', '发货人姓名', '发货人电话', '发货人详细地址'
  ];

  const aoa = [HEADERS];

  for (const o of orders) {
    const tn = makeTrackNum(o.offset);
    const activeItems = ITEMS.filter((_, i) => o.quantities[i] > 0);

    if (activeItems.length === 0) {
      // No items selected — still output one row (for address reference)
      aoa.push([
        tn, o.name, o.province, o.city, o.district,
        o.addrStr, '', o.mobile, '',
        1, 'N', '', '', '',
        '', senderName, senderPhone, senderAddr
      ]);
    } else {
      for (let i = 0; i < ITEMS.length; i++) {
        if (o.quantities[i] > 0) {
          aoa.push([
            tn, o.name, o.province, o.city, o.district,
            o.addrStr, '', o.mobile, '',
            1, 'N',
            ITEMS[i].name, ITEMS[i].barcode, o.quantities[i],
            '', senderName, senderPhone, senderAddr
          ]);
        }
      }
    }
  }

  // Build worksheet
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // Force barcode column (M = index 12) cells to text type
  const barcodeColLetter = 'M';
  for (let r = 1; r < aoa.length; r++) {
    const cellRef = barcodeColLetter + (r + 1);
    if (ws[cellRef]) {
      ws[cellRef].t = 's'; // string type — prevents scientific notation
    }
  }

  // Column widths
  ws['!cols'] = [
    {wch:15},{wch:8},{wch:8},{wch:10},{wch:8},
    {wch:36},{wch:10},{wch:14},{wch:18},
    {wch:10},{wch:8},{wch:32},{wch:16},{wch:8},
    {wch:12},{wch:10},{wch:12},{wch:16}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '收货信息');

  const now = new Date();
  const ds = now.getFullYear()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0');
  const filename = `运单_${ds}.xlsx`;

  XLSX.writeFile(wb, filename);

  const dataRows = aoa.length - 1;
  showToast(`已生成 ${filename}，共 ${dataRows} 行`, 'ok');
}

// ===================== Toast =====================
let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ===================== Keyboard shortcut =====================
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') {
    if (document.activeElement && document.activeElement.id === 'addrInput') {
      addOrder();
    }
  }
});
</script>
